<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" href="data:,">
    <title>sdk_help</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Tokens ── */
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 12px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        [data-theme="dark"] {
            --background: #0a0a0b;
            --foreground: #f0f0f2;
            --card: #111114;
            --card-foreground: #f0f0f2;
            --muted: #1c1c21;
            --muted-foreground: #9394a1;
            --border: #1f2028;
            --accent: #e8e8ec;
            --accent-foreground: #0a0a0b;
            --ring: #3b3d4a;
        }

        [data-theme="light"] {
            --background: #fafafa;
            --foreground: #0f0f12;
            --card: #ffffff;
            --card-foreground: #0f0f12;
            --muted: #f2f2f5;
            --muted-foreground: #6b6c7a;
            --border: #e4e4e9;
            --accent: #18181b;
            --accent-foreground: #fafafa;
            --ring: #c4c4cc;
        }

        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; }

        html {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--background);
            color: var(--foreground);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.6;
            padding:
                calc(0px + var(--safe-top))
                calc(0px + var(--safe-right))
                calc(0px + var(--safe-bottom))
                calc(0px + var(--safe-left));
            transition: background 0.3s ease, color 0.3s ease;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── Layout ── */
        .page {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-foreground);
        }

        /* ── Theme toggle ── */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--foreground);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .theme-toggle:hover {
            border-color: var(--ring);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            transition: opacity 0.25s, transform 0.35s;
        }

        .icon-sun, .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun { display: block; }
        [data-theme="light"] .icon-moon { display: block; }

        /* ── Profile section ── */
        .profile {
            margin-bottom: 36px;
        }

        .profile-name {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 6px;
        }

        .profile-handle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted-foreground);
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .profile-handle:hover {
            color: var(--foreground);
        }

        .profile-handle svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted-foreground);
            margin-bottom: 14px;
        }

        /* ── Project card ── */
        .project-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            color: var(--card-foreground);
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .project-card:hover {
            border-color: var(--ring);
        }

        .card-top {
            padding: 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--muted);
            color: var(--muted-foreground);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .card-file {
            font-size: 0.78rem;
            color: var(--muted-foreground);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        .card-body {
            padding: 16px 20px 20px;
        }

        .card-title {
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .card-desc {
            color: var(--muted-foreground);
            font-size: 0.9rem;
            line-height: 1.55;
            margin-bottom: 20px;
        }

        .card-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 16px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            min-height: 46px;
            padding: 0 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--muted);
            color: var(--foreground);
            font-family: var(--font-sans);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-decoration: none;
        }

        .btn:hover {
            border-color: var(--ring);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-foreground);
            font-weight: 600;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ── Footer ── */
        .footer {
            margin-top: auto;
            padding-top: 48px;
            text-align: center;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            letter-spacing: 0.02em;
        }

        /* ── Mobile optimizations ── */
        @media (max-width: 480px) {
            .page {
                padding: 18px 16px 32px;
            }

            .header {
                margin-bottom: 32px;
            }

            .profile {
                margin-bottom: 28px;
            }

            .card-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @media (max-width: 360px) {
            .profile-name {
                font-size: 1.6rem;
            }

            .card-body {
                padding: 14px 16px 16px;
            }

            .card-top {
                padding: 16px 16px 0;
            }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <script>
        (function() {
            var toggle = document.getElementById('theme-toggle');
            var html = document.documentElement;
            var saved = localStorage.getItem('theme');

            if (saved) {
                html.setAttribute('data-theme', saved);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                html.setAttribute('data-theme', 'light');
            }

            toggle.addEventListener('click', function() {
                var current = html.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();
    </script>
