<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="data:,">
    <title>sdk_help</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --card-alt: #000000;
            --border: #2f2f2f;
            --text: #ffffff;
            --muted: #b5b5b5;
            --button: #111111;
            --button-hover: #1a1a1a;
            --button-primary: #ffffff;
            --button-primary-hover: #ebebeb;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            padding:
                calc(24px + var(--safe-top))
                calc(16px + var(--safe-right))
                calc(28px + var(--safe-bottom))
                calc(16px + var(--safe-left));
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(100%, 640px);
            margin: 0 auto;
        }

        .username {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            margin-bottom: 16px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card-alt);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .card {
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            box-shadow: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 8px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .card-link {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .card h1 {
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 4vw, 2rem);
            line-height: 1.1;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .card p {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--button);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .button.primary {
            background: var(--button-primary);
            border-color: #ffffff;
            color: #000000;
        }

        .button:hover {
            background: var(--button-hover);
        }

        .button.primary:hover {
            background: var(--button-primary-hover);
        }

        .divider {
            height: 1px;
            margin: 0 0 18px;
            background: var(--border);
        }

        @media (max-width: 480px) {
            .actions {
                flex-direction: column;
            }

            .card-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <a class="username" href="https://t.me/lalala53s" target="_blank" rel="noreferrer">t.me/lalala53s</a>

        <section class="card">
            <div class="card-header">
                <span class="badge">Project</span>
                <a class="card-link" href="./gemini_rent.html">gemini_rent.html</a>
            </div>
            <h1>Аренда</h1>
            <p>Открыть игру или перейти к исходнику проекта.</p>
            <div class="divider"></div>
            <div class="actions">
                <a class="button primary" href="./gemini_rent.html">Открыть игру</a>
                <a class="button" href="https://t.me/+vRsAKTf3zdk0ZWVi" target="_blank" rel="noreferrer">Сурс проекта</a>
            </div>
        </section>
    </main>
</body>
</html>
